{% extends "base.html" %}
{% block title %}Register - 李亮節's Easy Social{% endblock %}
{% block content %}
  <section class="auth-panel">
    <h1>Create account</h1>
    <form method="post" class="form-stack">
      <label>
        Username
        <input name="username" maxlength="40" autocomplete="username" required>
      </label>
      <label>
        Email
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="new-password" required>
      </label>
      <label>
        CAPTCHA: {{ captcha_question }}
        <input name="captcha" type="text" inputmode="numeric" autocomplete="off" required placeholder="Enter the answer" aria-label="Answer to CAPTCHA question">
      </label>
      <button type="submit">Register</button>
    </form>
    <p class="muted">Already registered? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
  </section>
{% endblock %}
